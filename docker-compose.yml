services:
  app:
    build: .
    env_file: .env
    ports:
      # Direct access from the devcontainer shell (bypasses Traefik).
      # curl http://localhost:8001/health works inside the devcontainer.
      # Port 8001 avoids conflict with Traefik's 8000:80 mapping.
      - "127.0.0.1:8001:8000"
    volumes:
      # Host-mount the data directory so the SQLite database is visible on the
      # filesystem at ./data/app.db. This allows direct inspection, backup
      # verification, and migration dry-runs without entering the container.
      - ./data:/app/data
      # Host-mount migrations so schema changes take effect without rebuilding.
      - ./migrations:/app/migrations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`baseball.localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
    restart: unless-stopped

  traefik:
    image: traefik:v3
    command:
      # Dev-only: exposes the Traefik dashboard without authentication.
      # Remove --api.insecure=true in production; use Cloudflare Access instead.
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      # App traffic: http://localhost:8000 -> Traefik -> FastAPI container
      - "8000:80"
      # Traefik dashboard (dev only): http://localhost:8180
      # Moved from 8080 to 8180 to free 8080 for mitmproxy.
      - "8180:8080"
    volumes:
      # Traefik reads Docker labels to configure routing.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Traefik starts routing to the app only after the app health check passes.
    # This prevents Traefik from forwarding requests to an app that is still
    # running migrations or initializing.
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  mitmproxy:
    image: mitmproxy/mitmproxy
    # Use mitmweb for the web UI; override the default mitmproxy terminal entrypoint.
    entrypoint: ["mitmweb"]
    command:
      - "--web-host"
      - "0.0.0.0"
      - "--scripts"
      - "/app/proxy/addons/loader.py"
    profiles:
      - proxy
    environment:
      # Required so addon scripts can import project modules (src.*, etc.)
      - PYTHONPATH=/app
    ports:
      # Proxy listener -- bound to 0.0.0.0 so iPhone on LAN can reach it.
      - "0.0.0.0:8080:8080"
      # mitmweb UI -- accessible from host browser.
      - "0.0.0.0:8081:8081"
    volumes:
      # CA certificates persist across restarts so the iPhone trusts the cert once.
      - mitmproxy-certs:/home/mitmproxy/.mitmproxy
      # Project root mounted so addons can import src.* and write to .env and data/.
      - .:/app
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('localhost',8081),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      # Tunnel token from Cloudflare Zero Trust dashboard -> Networks -> Tunnels.
      # Set CLOUDFLARE_TUNNEL_TOKEN in .env. Never hardcode the token here.
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  # Persists mitmproxy CA certificates across container restarts.
  # The iPhone trusts the cert once; deleting this volume invalidates that trust.
  mitmproxy-certs:
