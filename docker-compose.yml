services:
  app:
    build: .
    env_file: .env
    ports:
      # Direct access from the devcontainer shell (bypasses Traefik).
      # curl http://localhost:8001/health works inside the devcontainer.
      # Port 8001 provides direct access to the app, bypassing Traefik.
      - "127.0.0.1:8001:8000"
    volumes:
      # Host-mount the data directory so the SQLite database is visible on the
      # filesystem at ./data/app.db. This allows direct inspection, backup
      # verification, and migration dry-runs without entering the container.
      - ./data:/app/data
      # Host-mount migrations so schema changes take effect without rebuilding.
      - ./migrations:/app/migrations
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # Dual-host rule: serves bbstats.ai in production and baseball.localhost in dev.
      - "traefik.http.routers.app.rule=Host(`bbstats.ai`) || Host(`baseball.localhost`)"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
    restart: unless-stopped

  traefik:
    image: traefik:v3
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    # No host ports in the base config. In production, all traffic arrives via
    # the Cloudflare Tunnel -> Docker-internal traefik:80 (no host binding needed).
    # Dev-only ports (8000:80 app traffic, 8180:8080 dashboard) are in
    # docker-compose.override.yml.
    volumes:
      # Traefik reads Docker labels to configure routing.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # Traefik starts routing to the app only after the app health check passes.
    # This prevents Traefik from forwarding requests to an app that is still
    # running migrations or initializing.
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  cloudflared:
    # Pinned to a specific stable version to prevent unexpected upstream changes.
    # Update this tag intentionally when upgrading cloudflared.
    image: cloudflare/cloudflared:2024.12.2
    command: tunnel --no-autoupdate run
    environment:
      # Tunnel token from Cloudflare Zero Trust dashboard -> Networks -> Tunnels.
      # Set CLOUDFLARE_TUNNEL_TOKEN in .env. Never hardcode the token here.
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
