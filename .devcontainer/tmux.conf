# tmux.conf -- baseball-crawl devcontainer
# Minimal config for VS Code integrated terminal compatibility.

# Change prefix from Ctrl+B to Ctrl+A (avoids VS Code Ctrl+B keybinding conflict).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Mouse support.
set -g mouse on

# Aggressive resize (fit window to smallest attached client).
set -g aggressive-resize on

# 1-based indexing for windows and panes.
set -g base-index 1
setw -g pane-base-index 1

# Split bindings: | for horizontal (side-by-side), - for vertical (top/bottom).
# Both preserve the current working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Extended keys -- pass Shift+Return and other modified keys through to applications.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Clean, minimal status bar.
set -g status-left "[#{session_name}] "
set -g status-left-length 30
set -g status-right ""
