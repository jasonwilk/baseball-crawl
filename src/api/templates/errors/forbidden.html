{% extends "base_auth.html" %}

{% block title %}403 Forbidden — LSB Baseball{% endblock %}

{% block content %}
<div class="min-h-screen flex items-start justify-center pt-16 px-4">
  <div class="w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Access Denied</h1>
    <p class="text-gray-600 mb-6">You do not have permission to access this page.</p>
    <div class="flex flex-col gap-3 items-center">
      <a
        href="/dashboard"
        class="inline-block bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-lg text-base transition-colors"
      >
        Back to Dashboard
      </a>
      <a
        href="/auth/login"
        class="text-sm text-blue-600 hover:underline"
      >
        Log in as a different user
      </a>
    </div>
  </div>
</div>
{% endblock %}
