{% extends "base_auth.html" %}

{% block title %}Register Your Device — LSB Baseball{% endblock %}

{% block content %}
<div class="min-h-screen flex items-start justify-center pt-16 px-4">
  <div class="w-full max-w-sm text-center">
    <div class="mb-6 text-5xl">&#x1f511;</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Register this device for quick login</h1>
    <p class="text-gray-600 mb-8">
      Skip the email next time. Register a passkey and log in with a fingerprint or PIN tap.
    </p>
    <a
      href="/auth/passkey/register"
      class="block w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-lg text-base transition-colors mb-3"
    >
      Register this device
    </a>
    <a
      href="/dashboard"
      class="block w-full bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3 px-6 rounded-lg text-base transition-colors border border-gray-300"
    >
      Skip for now
    </a>
  </div>
</div>
{% endblock %}
