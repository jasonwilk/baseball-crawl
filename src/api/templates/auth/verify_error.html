{% extends "base_auth.html" %}

{% block title %}Login Link Expired — Baseball Stats{% endblock %}

{% block content %}
<div class="min-h-screen flex items-start justify-center pt-16 px-4">
  <div class="w-full max-w-sm text-center">
    <div class="mb-6 text-5xl">&#x26a0;&#xfe0f;</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Login link invalid or expired</h1>
    <p class="text-gray-600 mb-6">
      This login link is invalid or has expired. Please request a new one.
    </p>
    <a
      href="/auth/login"
      class="inline-block bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-6 rounded-lg text-base transition-colors"
    >
      Request a new link
    </a>
  </div>
</div>
{% endblock %}
