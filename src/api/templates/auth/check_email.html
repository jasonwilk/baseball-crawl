{% extends "base_auth.html" %}

{% block title %}Check Your Email — Baseball Stats{% endblock %}

{% block content %}
<div class="min-h-screen flex items-start justify-center pt-16 px-4">
  <div class="w-full max-w-sm text-center">
    <div class="mb-6 text-5xl">&#x2709;&#xfe0f;</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Check your email</h1>
    <p class="text-gray-600 mb-6">
      If this email is registered, you will receive a login link.
    </p>
    <p class="text-gray-500 text-sm">
      Didn't receive it?
      <a href="/auth/login" class="text-blue-700 hover:underline">Try again</a>
    </p>
  </div>
</div>
{% endblock %}
