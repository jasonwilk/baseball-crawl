{% macro season_selector(seasons, active_season_id, base_url, team_id) %}
{% if seasons|length > 1 %}
<div class="mb-4 flex flex-wrap gap-2">
  {% for s in seasons %}
  <a
    href="{{ base_url }}?{% if team_id %}team_id={{ team_id }}&{% endif %}season_id={{ s.season_id }}"
    class="px-3 py-2 rounded text-sm font-medium
      {% if s.season_id == active_season_id %}
        bg-blue-900 text-white
      {% else %}
        bg-white text-blue-900 border border-blue-900 hover:bg-blue-50
      {% endif %}"
  >{{ s.season_id | season_display }}</a>
  {% endfor %}
</div>
{% endif %}
{% endmacro %}
