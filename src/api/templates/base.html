<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Baseball Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <nav class="bg-blue-900 text-white px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center">
      <span class="font-bold text-lg">LSB Baseball</span>
      {% block header_extras %}{% endblock %}
    </div>
  </nav>
  <main class="p-4 max-w-4xl mx-auto pb-16">
    {% block content %}{% endblock %}
  </main>
  <!-- Bottom fixed navigation bar (AC-1) -->
  <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 z-10">
    <div class="flex justify-around">
      <a
        href="/dashboard"
        class="flex-1 flex flex-col items-center justify-center py-3 text-xs font-medium
          {% if active_nav == 'batting' %}text-blue-900 font-bold{% else %}text-gray-600 hover:text-blue-900{% endif %}"
      >Batting</a>
      <a
        href="/dashboard/pitching"
        class="flex-1 flex flex-col items-center justify-center py-3 text-xs font-medium
          {% if active_nav == 'pitching' %}text-blue-900 font-bold{% else %}text-gray-600 hover:text-blue-900{% endif %}"
      >Pitching</a>
      <a
        href="/dashboard/games"
        class="flex-1 flex flex-col items-center justify-center py-3 text-xs font-medium
          {% if active_nav == 'games' %}text-blue-900 font-bold{% else %}text-gray-600 hover:text-blue-900{% endif %}"
      >Games</a>
      <a
        href="/dashboard/opponents"
        class="flex-1 flex flex-col items-center justify-center py-3 text-xs font-medium
          {% if active_nav == 'opponents' %}text-blue-900 font-bold{% else %}text-gray-600 hover:text-blue-900{% endif %}"
      >Opponents</a>
    </div>
  </nav>
</body>
</html>
