<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Baseball Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <nav class="bg-blue-900 text-white px-4 py-3">
    <div class="max-w-4xl mx-auto flex items-center gap-4">
      <span class="font-bold text-lg">LSB Baseball</span>
      <a href="/dashboard" class="text-blue-200 hover:text-white text-sm">Team Stats</a>
    </div>
  </nav>
  <main class="p-4 max-w-4xl mx-auto">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
